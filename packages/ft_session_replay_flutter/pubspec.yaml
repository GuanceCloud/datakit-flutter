name: ft_session_replay_flutter
description: Flutter Session Replay plugin for Guance mobile SDK.
version: 0.1.0-dev.1
homepage: https://www.guance.com/
repository: https://github.com/DataFlux-cn/datakit-flutter

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=1.12.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.15.0
  json_annotation: ^4.9.0

dev_dependencies:
  build_runner: any
  json_serializable: any
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.ft.sdk.flutter.sessionreplay
        pluginClass: FTSessionReplayFlutterPlugin
      ios:
        pluginClass: FTSessionReplayFlutterPlugin
