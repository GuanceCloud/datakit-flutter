plugins {
    id "com.android.library"
    id "kotlin-android"
}

group 'com.ft.sdk.flutter.sessionreplay'
version '1.0-SNAPSHOT'

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
        maven {
            url 'https://mvnrepo.jiagouyun.com/repository/maven-releases'
        }
    }
}

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.ft.sdk.flutter.sessionreplay'
    }
    compileSdk 34

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }
    defaultConfig {
        minSdkVersion 21
    }
    lintOptions {
        disable 'InvalidPackage'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.0"
    implementation 'com.cloudcare.ft.mobile.sdk.tracker.agent:ft-sdk:1.7.3'
    implementation 'com.cloudcare.ft.mobile.sdk.tracker.agent:ft-native:1.1.3'
    implementation 'com.cloudcare.ft.mobile.sdk.tracker.agent:ft-session-replay:0.1.6-alpha02'
    implementation 'com.google.code.gson:gson:2.8.5'
}
